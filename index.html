<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nins/English</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        /* 讓身體直接佔滿整個螢幕，並隱藏滾動條 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* 全黑色背景 */
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden; 
        }

        /* 頂部標題與狀態（浮動在最上層，不干擾點擊） */
        .header-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;    /* 垂直方向置中 */
            justify-content: center; /* 水平方向置中 */
            text-align: center;      /* 確保多行文字時也置中 */
            width: 90%;
            max-width: 400px;        /* 限制最大寬度，避免在平板/電腦上拉得太寬 */
            pointer-events: none;    /* 讓點擊可以穿過 */
        }
        h1 { 
            margin: 0; 
            font-size: 1.3rem; 
            text-align: center; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            color: #00ff00; /* 綠色科技感 */
        }
        #status { 
            font-size: 0.9rem; 
            color: #ccc; 
            text-align: center; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #222;
        }

        /* 滿版中央容器 */
        .container {
            width: 100vw;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
            position: relative;
        }

        /* 核心修改：超吸睛的滿版 100dvh 拍照按鈕 */
        .upload-btn {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            box-sizing: border-box;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 2;
            transition: all 0.3s ease;
        }
        .upload-btn .icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        .upload-btn .text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ff00;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0,255,0,0.6);
        }
        #fileInput { display: none; }

        /* 畫布：相片等比例縮放，絕不超出螢幕 */
        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            cursor: pointer;
            z-index: 2;
            display: none; /* 拍照前隱藏 */
        }

        /* 複製成功的彈出提示 */
        #resultToast {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 12px 24px;
            background-color: #28a745;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            text-align: center;
        }

        /* ==================== 新增：Dialog 與 IFRAME 樣式 ==================== */
        #dictDialog {
            width: 100%;
            height: 70%;
            max-width: 100vw;
            max-height: 100vh;
            background-color: #111111;
            border: 2px solid #fff;/*eaff00*/
            /*box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);*/
            color: #ffffff;
            border-radius: 12px;
            padding: 0;
            overflow: hidden;
            box-sizing: border-box;
        }
        /* Dialog 背景遮罩樣式 */
        #dictDialog::backdrop {
            background-color: rgba(0, 0, 0, 0.75);
        }
        /* Dialog 內部的佈局結構 */
        .dialog-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        .dialog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #222222;
            padding: 10px 16px;
            border-bottom: 1px solid #333333;
        }
        .dialog-title {
            margin: 0;
            font-size: 1.1rem;
            color: #fff;  /*00ff00*/
            font-weight: bold;
        }
        .close-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .close-btn:hover {
            background: #ff3333;
        }
        .dialog-body {
            flex: 1;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* 給 iframe 一個白色背景方便閱讀字典 */
        }
        .dialog-body iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- 頂部面板 -->
    <div class="header-panel">
    </div>

    <!-- 主要容器 -->
    <div class="container" id="canvasContainer">
        
        <!-- 畫布（拍照後才顯示） -->
        <canvas id="canvas"></canvas>

        <!-- 滿版 100dvh 觸控拍照按鈕 -->
        <label class="upload-btn" id="uploadBtn">
            <div id="status">正在載入辨識引擎，請稍候...</div>
            <input type="file" id="fileInput" accept="image/*" capture="environment">
        </label>

    </div>

    <!-- 複製提示 -->
    <div id="resultToast" style="display: none;"></div>

    <!-- ==================== 新增：原生的 DIALOG 視窗 ==================== -->
    <dialog id="dictDialog">
        <div class="dialog-layout">
            <div class="dialog-header">
                <span class="dialog-title" id="dialogTitle">WORD</span>
                <button class="close-btn" onclick="closeDialog()">CLOSE</button>
            </div>
            <div class="dialog-body">
                <iframe id="dictFrame" src="about:blank"></iframe>
            </div>
        </div>
    </dialog>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const resultToast = document.getElementById('resultToast');
        
        // 新增的 Dialog 控制元件
        const dictDialog = document.getElementById('dictDialog');
        const dialogTitle = document.getElementById('dialogTitle');
        const dictFrame = document.getElementById('dictFrame');
        
        let worker = null;
        let detectedWords = []; 
        let currentImg = null; 
        let selectedWord = null; 

        async function initOCR() {
            try {
                worker = await Tesseract.createWorker('eng');
                statusDiv.innerText = "引擎就緒，請點擊螢幕拍照。";
            } catch (e) {
                statusDiv.innerText = "引擎載入失敗。";
                console.error(e);
            }
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusDiv.innerText = "正在處理高畫質相片...";
            resultToast.style.display = "none"; 
            selectedWord = null;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    currentImg = img; 
                    processImage(img);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function processImage(img) {
            canvas.width = img.width;
            canvas.height = img.height;
            
            canvas.style.display = "block";
            uploadBtn.style.opacity = '0.5';
            uploadBtn.style.pointerEvents = 'none';
            uploadBtn.style.background = "transparent";
            
            ctx.drawImage(img, 0, 0);
            
            if (!worker) return;
            statusDiv.innerText = "正在辨識文字與符號...";///精準
            
            try {
                const { data: { words } } = await worker.recognize(canvas);
                detectedWords = words.filter(w => w.text.trim().length > 0);
                
                redrawCanvas();
                
                statusDiv.innerText = `辨識完成！共偵測到 ${detectedWords.length} 個項目。`;
            } catch (error) {
                statusDiv.innerText = "辨識錯誤。";
                console.error(error);
            }
        }

        function redrawCanvas() {
            if (!currentImg) return;
            ctx.drawImage(currentImg, 0, 0);
            
            const baseScale = Math.max(canvas.width, canvas.height) / 1000; 
            const lineWidthBlack = Math.max(4, 6 * baseScale);
            const lineWidthWhite = Math.max(2, 3 * baseScale);
            const fontSize = Math.max(16, 24 * baseScale);

            detectedWords.forEach(word => {
                const { x0, y0, x1, y1 } = word.bbox;
                const width = x1 - x0;
                const height = y1 - y0;

                ctx.save();
                
                if (selectedWord && selectedWord === word) {
                    ctx.strokeStyle = '#000000'; ctx.lineWidth = lineWidthBlack;
                    ctx.strokeRect(x0, y0, width, height);
                    ctx.strokeStyle = '#00ff00'; ctx.lineWidth = lineWidthWhite + 2; 
                    ctx.strokeRect(x0, y0, width, height);

                    ctx.font = `bold ${fontSize + 2}px Arial`;
                    ctx.fillStyle = '#000000';
                    ctx.fillText(word.text, x0, y0 - (baseScale * 6));
                    ctx.fillStyle = '#00ff00';
                    ctx.fillText(word.text, x0 + baseScale, y0 - (baseScale * 5));
                } else {
                    ctx.strokeStyle = '#000000'; ctx.lineWidth = lineWidthBlack;
                    ctx.strokeRect(x0, y0, width, height);
                    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = lineWidthWhite;
                    ctx.strokeRect(x0, y0, width, height);

                    ctx.font = `bold ${fontSize}px Arial`;
                    ctx.fillStyle = '#000000';
                    ctx.fillText(word.text, x0, y0 - (baseScale * 6));
                    ctx.fillText(word.text, x0 + (baseScale * 2), y0 - (baseScale * 6));
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(word.text, x0 + baseScale, y0 - (baseScale * 5));
                }
                
                ctx.restore();
            });
        }

        // ==================== 修改：綁定點擊文字後跳出 Dialog ====================
        document.body.addEventListener('click', function(event) {
            if (detectedWords.length === 0) return;

            if (event.target === canvas) {
                const rect = canvas.getBoundingClientRect();
                const clickX = event.clientX - rect.left;
                const clickY = event.clientY - rect.top;

                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const originalPhotoX = clickX * scaleX;
                const originalPhotoY = clickY * scaleY;

                const clickedWord = detectedWords.find(word => {
                    const { x0, y0, x1, y1 } = word.bbox;
                    return originalPhotoX >= x0 && originalPhotoX <= x1 &&
                           originalPhotoY >= y0 && originalPhotoY <= y1;
                });

                if (clickedWord) {
                    selectedWord = clickedWord; 
                    redrawCanvas(); 

                    const rawText = clickedWord.text.trim(); 
                    
                    // 1. 複製到剪貼簿
                    navigator.clipboard.writeText(rawText).then(() => {
                        statusDiv.innerText = `已選取並複製 "${rawText}"`;
                    }).catch(err => console.log('複製失敗', err));

                    // 2. 觸發彈出視窗並載入字典
                    openDictDialog(rawText);
                    
                    return; 
                }
            }
        });

        // 顯示 Dialog 的函式
        function openDictDialog(word) {
            dialogTitle.innerText = `${word}`;///查詢單字: 
            
            // 使用不會擋 X-Frame-Options 的 Wiktionary 作為內嵌字典
            const safeWord = encodeURIComponent(word.toLowerCase());
            dictFrame.src = `https://zh.wiktionary.org/wiki/${safeWord}`;
            
            // 使用原生 showModal() 打開，自帶背景遮罩，並將焦點鎖定在彈窗內
            dictDialog.showModal();
        }

        // 關閉 Dialog 的函式
        function closeDialog() {
            dictDialog.close();
            dictFrame.src = "about:blank"; // 關閉時清空 iframe，節省記憶體並防背景音
        }

        window.addEventListener('DOMContentLoaded', initOCR);
    </script>
</body>
</html>
