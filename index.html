<!DOCTYPE html>
<html lang="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>o</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    background:#fff;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#output{
    width:90%;
    max-width:900px;
    padding:20px;
    box-sizing:border-box;

    text-align:center;
    white-space:pre-wrap;
    word-break:break-word;

    font-size:24px;
    line-height:1.6;
}
</style>
</head>
<body>

<div id="output">Loading...</div>

<script>
const COAGENT = "https://duguaynins-coagent.hf.space";

// 帳密
const USERNAME = "duguaynins";
const PASSWORD = "duguaynins";

let sessionId = null;

function getAuthHeader(){
    return {
        "Content-Type":"application/json",
        "Authorization":"Basic " + btoa(`${USERNAME}:${PASSWORD}`)
    };
}

async function startSession(){

    try{

        const resp = await fetch(`${COAGENT}/session`,{
            method:"POST",
            headers:getAuthHeader(),
            body:"{}"
        });

        if(!resp.ok){
            document.getElementById("output").textContent =
                "Session Error : " + resp.status;
            return;
        }

        const data = await resp.json();

        sessionId = data.id;

        sendMessage();

    }catch(err){

        document.getElementById("output").textContent =
            err.message;

    }

}

async function sendMessage(){

    const lang = navigator.language;

    const payload = {
        parts:[
            {
                type:"text",
                text:`My language code is ${lang}. Please respond in ${lang}.`
            }
        ]
    };

    try{

        const resp = await fetch(
            `${COAGENT}/session/${sessionId}/message`,
            {
                method:"POST",
                headers:getAuthHeader(),
                body:JSON.stringify(payload)
            }
        );

        if(!resp.ok){

            document.getElementById("output").textContent =
                "Message Error : " + resp.status;

            return;

        }

        const result = await resp.json();

        let text = "";

        for(const part of result.parts || []){

            if(part.type==="text"){

                text += part.text;

            }

        }

        document.getElementById("output").textContent = text;

    }catch(err){

        document.getElementById("output").textContent =
            err.message;

    }

}

startSession();
</script>

</body>
</html>
