<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>WebRTC 雙向即時同步</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; line-height: 1.6; }
        .container { display: flex; gap: 20px; margin-bottom: 20px; }
        .box { flex: 1; }
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
        textarea[readonly] { background: #f9f9f9; cursor: not-allowed; }
        .controls { background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        button { padding: 8px 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; margin-right: 5px; }
        button:hover { background: #0056b3; }
        pre { background: #222; color: #7f7; padding: 10px; border-radius: 5px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; font-size: 12px; }
        h3 { margin-top: 0; }
    </style>
</head>
<body>
    <h2>WebRTC 雙向文字同步</h2>

    <div class="container">
        <div class="box">
            <h3>我的輸入 (傳送)</h3>
            <textarea id="localInput" placeholder="在此輸入文字，對方將即時看到..."></textarea>
        </div>
        <div class="box">
            <h3>對方的輸入 (接收)</h3>
            <textarea id="remoteInput" placeholder="對方的輸入會顯示在這裡..." readonly></textarea>
        </div>
    </div>

    <div class="controls">
        <strong>第一步：</strong> <button id="createOffer">建立連線邀請 (Offer)</button>
        <br><br>
        <strong>第二步：</strong> <button id="handleSignaling">處理交換信令 (Answer / Remote SDP)</button>
    </div>

    <pre id="log">系統日誌：等待操作...</pre>

    <script>
        const localInput = document.getElementById("localInput");
        const remoteInput = document.getElementById("remoteInput");
        const logEl = document.getElementById("log");

        function log(msg) { 
            const now = new Date().toLocaleTimeString();
            logEl.textContent = `[${now}] ${msg}\n` + logEl.textContent; 
        }

        let pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });

        let dataChannel;

        // 設定資料通道的監聽函式
        function setupDataChannel(channel) {
            dataChannel = channel;
            dataChannel.onopen = () => {
                log("🚀 連線成功！DataChannel 已開啟。");
                localInput.disabled = false;
            };
            dataChannel.onmessage = (event) => {
                remoteInput.value = event.data;
            };
            dataChannel.onclose = () => log("❌ 連線已關閉。");
        }

        // 接收端：監聽對方建立的 DataChannel
        pc.ondatachannel = (event) => {
            log("收到對方的 DataChannel 請求");
            setupDataChannel(event.channel);
        };

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                log("新的 ICE Candidate 已生成，請確保完整複製 SDP。");
            }
        };

        // 發起端：建立 Offer 並建立 DataChannel
        document.getElementById("createOffer").addEventListener("click", async () => {
            const dc = pc.createDataChannel("chat");
            setupDataChannel(dc);

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            // 延遲一點點讓 ICE Candidate 收集完成，方便使用者一次複製
            setTimeout(() => {
                const sdp = JSON.stringify(pc.localDescription);
                log("【請複製以下代碼給對方】\n" + sdp);
                prompt("請複製以下 Offer SDP：", sdp);
            }, 500);
        });

        // 處理信令交換 (Answer 或設定 Remote Description)
        document.getElementById("handleSignaling").addEventListener("click", async () => {
            const input = prompt("請貼上對方的 SDP (JSON格式):");
            if (!input) return;

            const sdp = JSON.parse(input);
            await pc.setRemoteDescription(sdp);

            if (sdp.type === "offer") {
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                log("【Answer 已建立，請複製回傳給發起者】\n" + JSON.stringify(answer));
                prompt("請複製以下 Answer SDP：", JSON.stringify(answer));
            } else {
                log("✅ 已成功設定對方的 Answer，連線應會自動建立。");
            }
        });

        // 即時傳送輸入內容
        localInput.addEventListener("input", () => {
            if (dataChannel && dataChannel.readyState === "open") {
                dataChannel.send(localInput.value);
            }
        });
    </script>
</body>
</html>
