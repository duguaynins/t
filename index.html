<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stable flow</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111827;
}
canvas{
    display:block;
    width:100vw;
    height:100vh;
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w, h, dpr;

function resize(){
    dpr = window.devicePixelRatio || 1;
    w = window.innerWidth;
    h = window.innerHeight;

    canvas.width = w * dpr;
    canvas.height = h * dpr;

    canvas.style.width = w + "px";
    canvas.style.height = h + "px";

    ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener("resize", resize);

// 🌈 色彩函數（不爆白關鍵）
function hsla(h, a){
    return `hsla(${h}, 85%, 60%, ${a})`;
}

function draw(t){

    const time = t * 0.001;

    // 🌫 關鍵：衰減（避免累積爆白）
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "rgba(17, 24, 39, 0.18)";
    ctx.fillRect(0,0,w,h);

    // 🌊 光混合模式
    ctx.globalCompositeOperation = "lighter";

    // 🌬 控制強度（避免飽和）
    const breath = 0.6 + Math.sin(time * 0.8) * 0.25;

    const baseHue = time * 30;

    for(let i=0;i<12;i++){

        const angle = time * 0.4 + i * 0.6;

        const radius = (Math.min(w,h) * 0.22) * (1 + Math.sin(time*0.6 + i)*0.3);

        const x = w/2 + Math.cos(angle + i) * radius;
        const y = h/2 + Math.sin(angle * 1.3 + i) * radius;

        const hue = (baseHue + i*15) % 360;

        const size = Math.min(w,h) * 0.35;

        const g = ctx.createRadialGradient(x,y,0,x,y,size);

        // 🌊 限制 alpha（關鍵避免全白）
        g.addColorStop(0, hsla(hue, 0.18 * breath));
        g.addColorStop(1, "transparent");

        ctx.fillStyle = g;
        ctx.fillRect(0,0,w,h);
    }

    requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>

</body>
</html>
