<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Markdown Editor</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turndown/dist/turndown.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    font-family: Arial, "Microsoft JhengHei", sans-serif;
}

.container {
    display: flex;
    width: 100%;
    height: 100vh;
}

.editor,
.preview {
    flex: 1;
    padding: 15px;
    overflow: auto;
}

.editor {
    border-right: 1px solid #ccc;
    background: #f7f7f7;
}

textarea {
    width: 100%;
    height: 100%;
    resize: none;
    border: 1px solid #aaa;
    padding: 15px;
    font-size: 16px;
    font-family: Consolas, monospace;
}

.preview {
    background: white;
}

.preview-area {
    min-height: 100%;
    outline: none;
    padding: 15px;
}

.preview-area:focus {
    border: 1px dashed #888;
}


/* 手機模式 */
@media(max-width:768px){

    .container {
        flex-direction: column;
    }

    .editor,
    .preview {
        height: 50%;
        flex: none;
    }

    .editor {
        border-right: none;
        border-bottom: 1px solid #ccc;
    }
}

</style>

</head>

<body>

<div class="container">

    <div class="editor">
        <textarea id="markdown">
# Markdown 編輯器

## 功能

- 左側輸入 Markdown
- 右側即時預覽

**粗體文字**

[Google](https://google.com)
        </textarea>
    </div>


    <div class="preview">
        <div 
            id="previewArea"
            class="preview-area"
            contenteditable="true">
        </div>
    </div>

</div>


<script>

const markdown = document.getElementById("markdown");
const preview = document.getElementById("previewArea");

const turndownService = new TurndownService({
    headingStyle: "atx",
    bulletListMarker: "-"
});


let updating = false;


// Markdown -> Preview
function renderPreview(){

    if(updating) return;

    updating = true;

    preview.innerHTML = marked.parse(markdown.value);

    updating = false;
}


// Preview -> Markdown
function updateMarkdown(){

    if(updating) return;

    updating = true;

    markdown.value = turndownService.turndown(
        preview.innerHTML
    );

    updating = false;
}


// 原始碼修改
markdown.addEventListener(
    "input",
    renderPreview
);


// 預覽修改
preview.addEventListener(
    "input",
    updateMarkdown
);


// 初始載入
renderPreview();


</script>

</body>
</html>
