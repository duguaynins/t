<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業 Web 相機 - 畫質自訂版</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --danger-color: #FF3B30;
            --bg-color: #1c1c1e;
            --panel-bg: rgba(0, 0, 0, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .camera-container {
            position: relative;
            width: 95%;
            max-width: 500px;
            aspect-ratio: 3/4;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        #status {
            position: absolute;
            top: 15px; left: 15px;
            padding: 5px 12px;
            background: var(--panel-bg);
            border-radius: 20px;
            font-size: 12px;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .recording-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--danger-color);
            border-radius: 50%;
            margin-right: 5px;
            animation: blink 1s infinite;
            display: none;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* 控制面板 */
        .controls {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 25px 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        button {
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        button:active { transform: scale(0.9); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* 錄影按鈕 */
        #recordBtn {
            width: 50px; height: 50px;
            background: var(--danger-color);
            border-radius: 12px;
        }
        #recordBtn.recording { border-radius: 50%; animation: pulse 1.5s infinite; }

        /* 拍照按鈕 */
        #captureBtn {
            width: 70px; height: 70px;
            background: white;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.3);
        }

        /* 畫質調整按鈕 */
        #resBtn {
            width: 50px; height: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            color: white;
            font-size: 10px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #resBtn span { font-size: 14px; display: block; margin-top: 2px; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }

        #progressBar { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); }
        #progress { height: 100%; width: 0%; background: var(--primary-color); transition: width 0.1s; }
    </style>
</head>
<body>

<div class="camera-container">
    <div id="status">
        <span class="recording-dot" id="dot"></span>
        <span id="statusTxt">初始化中...</span>
    </div>

    <video id="video" autoplay playsinline></video>
    
    <div class="controls">
        <button id="recordBtn" disabled onclick="toggleRecording()"></button>
        <button id="captureBtn" disabled onclick="capturePhoto()"></button>
        <button id="resBtn" onclick="changeResolution()">
            QUALITY
            <span id="resLabel">HD</span>
        </button>
    </div>

    <div id="progressBar">
        <div id="progress"></div>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    let video = document.getElementById("video");
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");
    let captureBtn = document.getElementById("captureBtn");
    let recordBtn = document.getElementById("recordBtn");
    let statusTxt = document.getElementById("statusTxt");
    let resLabel = document.getElementById("resLabel");
    let dot = document.getElementById("dot");

    let ready = false;
    let recording = false;
    let currentStream;
    let mediaRecorder;
    let recordedChunks = [];
    
    // 畫質設定清單
    const resolutions = [
        { label: "HD", width: 1280, height: 720 },
        { label: "FHD", width: 1920, height: 1080 },
        { label: "4K", width: 3840, height: 2160 }
    ];
    let resIndex = 0;

    async function startCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }

        const res = resolutions[resIndex];
        statusTxt.innerText = `正在切換至 ${res.label}...`;
        resLabel.innerText = res.label;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "environment", 
                    width: { ideal: res.width }, 
                    height: { ideal: res.height } 
                },
                audio: true 
            });
            currentStream = stream;
            video.srcObject = stream;
        } catch (err) {
            statusTxt.innerText = "❌ 無法取得相機";
            console.error(err);
        }
    }

    // 畫質切換函數
    function changeResolution() {
        if (recording) return alert("錄影中無法切換畫質");
        resIndex = (resIndex + 1) % resolutions.length;
        ready = false;
        captureBtn.disabled = true;
        recordBtn.disabled = true;
        startCamera();
    }

    video.addEventListener("canplay", () => {
        if (!ready) {
            ready = true;
            captureBtn.disabled = false;
            recordBtn.disabled = false;
            statusTxt.innerText = `已就緒 (${video.videoWidth}x${video.videoHeight})`;
        }
    });

    startCamera();

    function capturePhoto() {
        if (!ready) return;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        drawVideoWithWatermark();
        simulateProgress(() => savePhoto());
    }

    function drawVideoWithWatermark() {
        ctx.drawImage(video, 0, 0);
        let now = new Date();
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(20, canvas.height - 70, 380, 50);
        ctx.fillStyle = "white";
        ctx.font = `${Math.max(20, canvas.width/40)}px sans-serif`;
        ctx.fillText(`${now.toLocaleString()} | ${resolutions[resIndex].label}`, 40, canvas.height - 35);
    }

    function savePhoto() {
        let link = document.createElement("a");
        link.download = `IMG_${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    function simulateProgress(callback) {
        let prog = document.getElementById("progress");
        let w = 0;
        let timer = setInterval(() => {
            w += 10;
            prog.style.width = w + "%";
            if (w >= 100) {
                clearInterval(timer);
                setTimeout(() => { prog.style.width = "0%"; callback(); }, 200);
            }
        }, 30);
    }

    function toggleRecording() {
        if (!recording) startRecording(); else stopRecording();
    }

    function startRecording() {
        recordedChunks = [];
        const canvasStream = canvas.captureStream(30);
        // 取得當前 stream 的音軌
        const audioTracks = currentStream.getAudioTracks();
        const combinedStream = new MediaStream([
            ...canvasStream.getVideoTracks(),
            ...audioTracks
        ]);

        mediaRecorder = new MediaRecorder(combinedStream, { mimeType: "video/webm; codecs=vp8,opus" });
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = saveVideo;
        
        mediaRecorder.start();
        recording = true;
        recordBtn.classList.add("recording");
        dot.style.display = "inline-block";
        statusTxt.innerText = "REC 錄影中...";

        function renderLoop() {
            if (recording) {
                drawVideoWithWatermark();
                requestAnimationFrame(renderLoop);
            }
        }
        renderLoop();
    }

    function stopRecording() {
        recording = false;
        mediaRecorder.stop();
        recordBtn.classList.remove("recording");
        dot.style.display = "none";
        statusTxt.innerText = "已就緒";
    }

    function saveVideo() {
        let blob = new Blob(recordedChunks, { type: "video/webm" });
        let url = URL.createObjectURL(blob);
        let link = document.createElement("a");
        link.href = url;
        link.download = `VIDEO_${Date.now()}.webm`;
        link.click();
    }
</script>
</body>
</html>
