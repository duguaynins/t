<!DOCTYPE html>
<html lang="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100dvw;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: #fff;
}

#qrcode {
    display: flex;
    justify-content: center;
    align-items: center;
}

#qrcode img,
#qrcode canvas {
    display: block;
}
</style>
</head>

<body>

<div id="qrcode"></div>

<script>
function getContent() {
    const params = new URLSearchParams(location.search);
    return decodeURIComponent(params.get("q") || location.hash.substring(1));
}

function generateQR() {
    const text = getContent();
    const qr = document.getElementById("qrcode");
    qr.innerHTML = "";

    if (!text) return;

    // 取視窗最小邊，保留約 5% 邊距
    const size = Math.floor(Math.min(window.innerWidth, window.innerHeight) * 0.95);

    new QRCode(qr, {
        text,
        width: size,
        height: size,
        correctLevel: QRCode.CorrectLevel.H
    });
}

generateQR();

window.addEventListener("resize", generateQR);
window.addEventListener("hashchange", generateQR);
</script>

</body>
</html>
