<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nins / cocolors.sys</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:#111827;
}
canvas{
    display:block;
    width:100vw;
    height:100vh;
    cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// ===== resize (支援 retina) =====
function resize() {
    const dpr = devicePixelRatio || 1;

    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener("resize", resize);

// ===== random color =====
function randomColor() {
    const hue = Math.floor(Math.random() * 360);
    return `hsl(${hue}, 85%, 60%)`;
}

// ===== draw =====
function draw() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    const c1 = randomColor();
    const c2 = randomColor();
    const c3 = randomColor();
    const c4 = randomColor();
    const c5 = randomColor();

    ctx.clearRect(0, 0, w, h);

    function blob(x, y, color, radius) {
        const g = ctx.createRadialGradient(x, y, 0, x, y, radius);
        g.addColorStop(0, color);
        g.addColorStop(1, "transparent");

        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
    }

    blob(w * 0.2, h * 0.2, c1, w * 0.7);
    blob(w * 0.8, h * 0.2, c2, w * 0.7);
    blob(w * 0.3, h * 0.8, c3, w * 0.7);
    blob(w * 0.8, h * 0.8, c4, w * 0.7);
    blob(w * 0.5, h * 0.5, c5, w * 0.9);
}

// ===== download (純 Canvas) =====
function download() {
    const link = document.createElement("a");
    /*
    const timestamp = new Date()
        .toISOString()
        .replace(/[:.]/g, "-"); */
    const timestamp = Date.now();
    link.download = `nins-cocolors-${timestamp}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
}

// ===== init =====
draw();

// 單次點擊：重新生成 + 下載 + 停止監聽
document.addEventListener("click", () => {
    ///draw();
    download();
}, { once: true });

</script>

</body>
</html>
