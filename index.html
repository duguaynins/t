<!DOCTYPE html>
<html lang="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nins / QR-CROP.SYS</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Courier New', 'Consolas', monospace;
  background: #fff; color: #000; height: 100vh; display: flex; flex-direction: column;
  cursor: default;
}
::selection { background: #000; color: #fff; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #fff; }
::-webkit-scrollbar-thumb { background: #000; border-radius: 0; }
::-webkit-scrollbar-thumb:hover { background: #333; }

.toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; background: #fff;
  border-bottom: 3px double #000; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 10;
}
.toolbar h1 {
  font-size: 0.75rem; color: #000; margin-right: 8px;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 2px 6px; border: 1px solid #000;
}
.toolbar .cursor-blink { animation: blink 1s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

.btn {
  display: inline-block;
  background: #fff; color: #000; border: 2px solid #000;
  padding: 5px 12px; cursor: pointer; font-size: 0.7rem;
  font-family: 'Courier New', monospace;
  text-transform: uppercase; letter-spacing: 1px;
  transition: none; font-weight: bold;
  text-align: center;
}
.btn:hover:not(:disabled) { background: #000; color: #fff; }
.btn:active:not(:disabled) { background: #333; color: #fff; }
.btn:disabled { opacity: .3; cursor: not-allowed; border-style: dashed; }
.btn.outline { opacity: .7; }
.btn.outline:hover { opacity: 1; background: #000; color: #fff; }
.btn.active { background: #000; color: #fff; }

.main { flex: 1; display: grid; grid-template-columns: 1fr; overflow: hidden; }

@media (min-width: 992px) {
  .main { grid-template-columns: 380px 1fr; }
}

.sidebar { 
  border-right: 2px solid #000; display: flex; flex-direction: column; 
  background: #fff; overflow-y: auto;
}
.workspace { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 12px; gap: 12px; }

.panel { display: flex; flex-direction: column; border: 1px solid #000; margin-bottom: 4px; }
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px; background: #f0f0f0; border-bottom: 1px solid #000;
  font-size: 0.7rem; color: #000; text-transform: uppercase; letter-spacing: 1px;
  font-weight: bold;
}
.panel-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

.img-frame {
  border: 1px solid #000; background: #fafafa; display: flex; 
  align-items: center; justify-content: center; min-height: 120px; position: relative;
  overflow: hidden;
}
.img-frame video, .img-frame canvas {
  max-width: 100%; max-height: 320px; object-fit: contain; display: block;
}

.no-signal {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  background: #fff; color: #888; font-size: 0.75rem; letter-spacing: 2px;
  z-index: 2;
}
.no-signal span { border: 1px dashed #888; padding: 4px 8px; }
.no-signal.hide { display: none; }

.ocr-output {
  font-family: 'Courier New', 'Consolas', monospace; font-size: 0.75rem;
  line-height: 1.5; white-space: pre-wrap; word-wrap: break-word;
  background: #fafafa; border: 1px solid #000; padding: 10px;
  min-height: 70px; max-height: 200px; overflow-y: auto; color: #000;
}
.ocr-output.empty { color: #888; font-style: italic; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.statusbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px; background: #f0f0f0; border-top: 3px double #000;
  font-size: 0.65rem; color: #000; text-transform: uppercase; letter-spacing: 1px;
  font-weight: bold;
}
.statusbar .blink { animation: blink 1s step-end infinite; }

.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.9); display: none; align-items: center; justify-content: center; z-index: 1000;
}
.modal-overlay.show { display: flex; }
.modal { background: #fff; border: 3px double #000; padding: 16px 24px; max-width: 360px; width: 90%; }
.modal-title { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid #000; padding-bottom: 4px; }
.modal-message { font-size: 0.7rem; line-height: 1.5; margin-bottom: 16px; color: #333; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>C:\&gt;<span class="cursor-blink">&#9608;</span></h1>
  <div style="font-size:0.75rem; font-weight:bold; letter-spacing:1px; margin-right:12px;">QR-LIVE.SYS v2.5</div>
  
  <button id="videoBtn" class="btn">[ F2: START CAMERA ]</button>
  
  <span id="dotInfo" style="font-size:0.65rem; color:#666; margin-left:auto; letter-spacing:1px; text-transform:uppercase;">STANDBY</span>
</div>

<div class="main">
  
  <div class="sidebar">
    <div class="workspace">
      <div class="panel" style="flex:1; min-height:200px;">
        <div class="panel-header">
          <span>&gt; LIVE CAMERA FEED</span>
          <span style="opacity:0.5;">INPUT</span>
        </div>
        <div class="panel-body" style="flex:1; justify-content:center;">
          <div class="img-frame" style="height:100%;">
            <video id="videoFeed" autoplay playsinline muted style="width:100%; height:100%;"></video>
            <div class="no-signal" id="srcSignal"><span>AWAITING CAMERA STREAM</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="workspace">
    
    <div class="grid-2">
      <div class="panel">
        <div class="panel-header">
          <span>&gt; QR REGION</span>
          <button id="downloadQr" class="btn outline" style="padding:2px 6px; font-size:0.6rem;" disabled>SAVE</button>
        </div>
        <div class="panel-body">
          <div class="img-frame">
            <canvas id="qrCanvas"></canvas>
            <div class="no-signal" id="qrSignal"><span>NO QR STEP</span></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span>&gt; RED DOTS DEBUG</span>
          <span style="opacity:0.5;">ANALYSIS</span>
        </div>
        <div class="panel-body">
          <div class="img-frame">
            <canvas id="debugCanvas"></canvas>
            <div class="no-signal" id="debugSignal"><span>NO DATA</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span>&gt; TEXT ROI (FROM 4 RED DOTS)</span>
        <button id="downloadText" class="btn outline" style="padding:2px 6px; font-size:0.6rem;" disabled>SAVE CROP</button>
      </div>
      <div class="panel-body">
        <div class="img-frame" style="min-height:140px;">
          <canvas id="textCanvas"></canvas>
          <div class="no-signal" id="textSignal"><span>AWAITING MARKERS</span></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span>&gt; OCR RECOGNITION MATRIX</span>
        <span style="opacity:0.5;">OUTPUT</span>
      </div>
      <div class="panel-body">
        <pre id="ocrResult" class="ocr-output empty">AWAITING ENGINE STAGE...</pre>
      </div>
    </div>

  </div>
</div>

<div class="statusbar">
  <span>C:\&gt; <span class="blink">&#9608;</span> QR-LIVE.SYS v2.5</span>
  <span id="statusText">READY</span>
  <span id="statusTime"></span>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">SYSTEM ALERT</div>
    <div class="modal-message" id="modalMessage">MESSAGE BODY</div>
    <button class="btn" id="modalBtn" style="width:100%;">[ CLOSE ]</button>
  </div>
</div>

<script src="https://unpkg.com/@zxing/browser@latest"></script>
<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
const videoBtn = document.getElementById("videoBtn");
const videoFeed = document.getElementById("videoFeed");
const qrCanvas = document.getElementById("qrCanvas");
const debugCanvas = document.getElementById("debugCanvas");
const textCanvas = document.getElementById("textCanvas");
const downloadQr = document.getElementById("downloadQr");
const downloadText = document.getElementById("downloadText");
const ocrResult = document.getElementById("ocrResult");
const dotInfo = document.getElementById("dotInfo");
const modalOverlay = document.getElementById("modalOverlay");
const modalTitle = document.getElementById("modalTitle");
const modalMessage = document.getElementById("modalMessage");
const modalBtn = document.getElementById("modalBtn");
const statusText = document.getElementById("statusText");
const statusTime = document.getElementById("statusTime");

// Signals
const srcSignal = document.getElementById("srcSignal");
const qrSignal = document.getElementById("qrSignal");
const debugSignal = document.getElementById("debugSignal");
const textSignal = document.getElementById("textSignal");

let codeReader = null;
let isScanning = false;
let ocrProcessing = false; // 防止重複執行 OCR 造成阻塞

function showModal(title, message) {
  modalTitle.textContent = "! " + title;
  modalMessage.textContent = message;
  modalOverlay.classList.add("show");
}
function hideModal() { modalOverlay.classList.remove("show"); }
function setStatus(msg) { statusText.textContent = msg; }

modalBtn.onclick = hideModal;

// 初始化 ZXing
codeReader = new ZXing.BrowserQRCodeReader();

videoBtn.onclick = async () => {
  if (isScanning) {
    stopScanning();
  } else {
    await startScanning();
  }
};

async function startScanning() {
  try {
    isScanning = true;
    videoBtn.textContent = "[ F2: STOP CAMERA ]";
    videoBtn.classList.add("active");
    srcSignal.classList.add("hide");
    setStatus("INITIALIZING CAMERA...");
    ocrResult.textContent = "SYS: TESSERACT ENGINE STANDBY...";
    ocrResult.classList.remove("empty");

    // 呼叫鏡頭並持續解碼偵測
    await codeReader.decodeFromVideoDevice(undefined, videoFeed, (result, error) => {
      if (result) {
        processFrame(result);
      }
      if (error && !(error instanceof ZXing.NotFoundException)) {
        console.error(error);
      }
    });

  } catch (err) {
    console.error(err);
    showModal("CAMERA ERROR", "UNABLE TO ACCESS MEDIA VIDEO DEVICE.");
    stopScanning();
  }
}

function stopScanning() {
  isScanning = false;
  videoBtn.textContent = "[ F2: START CAMERA ]";
  videoBtn.classList.remove("active");
  srcSignal.classList.remove("hide");
  qrSignal.classList.remove("hide");
  debugSignal.classList.remove("hide");
  textSignal.classList.remove("hide");
  dotInfo.textContent = "STANDBY";
  setStatus("READY");
  
  codeReader.reset(); // 停止視訊串流與解碼
}

// 核心處理邏輯：當辨識到 QR 碼時觸發
function processFrame(resultQR) {
  const qrPoints = resultQR.resultPoints;
  const qrText = resultQR.getText();

  if (!qrPoints || qrPoints.length < 3) return;

  // 1. 計算 QR 範圍並裁切
  let minX = Infinity, maxX = -Infinity;
  let minY = Infinity, maxY = -Infinity;
  qrPoints.forEach(p => {
    minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
    minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
  });

  // 這裡需要透過隱藏的 canvas 抓取當前 video 影格
  const vW = videoFeed.videoWidth;
  const vH = videoFeed.videoHeight;
  if (!vW || !vH) return;

  const tempCanvas = document.createElement("canvas");
  tempCanvas.width = vW;
  tempCanvas.height = vH;
  const tempCtx = tempCanvas.getContext("2d");
  tempCtx.drawImage(videoFeed, 0, 0, vW, vH);

  const qrPad = Math.max(20, Math.round((maxX - minX) * 0.12));
  const sx = Math.max(0, minX - qrPad);
  const sy = Math.max(0, minY - qrPad);
  const sw = Math.min(vW - sx, (maxX - minX) + qrPad * 2);
  const sh = Math.min(vH - sy, (maxY - minY) + qrPad * 2);

  qrCanvas.width = sw;
  qrCanvas.height = sh;
  const qrCtx = qrCanvas.getContext("2d");
  qrCtx.drawImage(tempCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
  qrSignal.classList.add("hide");

  dotInfo.textContent = `QR OK: ${qrText.slice(0,10)}... | RES: ${sw}x${sh}`;
  setStatus("TRACKING TARGET MARKERS...");

  // 2. 紅點偵測與 Debug 繪製
  const dots = findRedDots(qrCtx, sw, sh);

  debugCanvas.width = sw;
  debugCanvas.height = sh;
  const debugCtx = debugCanvas.getContext("2d");
  debugCtx.drawImage(qrCanvas, 0, 0);
  debugSignal.classList.add("hide");

  dots.forEach((d, i) => {
    debugCtx.strokeStyle = "#000000";
    debugCtx.lineWidth = 2;
    debugCtx.strokeRect(d.minX, d.minY, d.maxX - d.minX + 1, d.maxY - d.minY + 1);
    debugCtx.beginPath();
    debugCtx.arc(d.x, d.y, 4, 0, Math.PI * 2);
    debugCtx.stroke();
    debugCtx.fillStyle = "#000000";
    debugCtx.font = "10px monospace";
    debugCtx.fillText(`#${i}`, d.x + 6, d.y - 6);
  });

  if (dots.length < 4) {
    dotInfo.textContent = `MARKERS FETCH FAILED: ${dots.length}/4 FOUND`;
    return;
  }

  const corners = pick4Corners(dots);
  dotInfo.textContent += ` | DOTS: ${dots.length}`;

  corners.forEach(d => {
    debugCtx.strokeStyle = "#000000";
    debugCtx.strokeRect(d.minX, d.minY, d.maxX - d.minX + 1, d.maxY - d.minY + 1);
  });

  // 3. 提取文字範圍 (ROI)
  const [tl, tr, br, bl] = corners;
  let textX = Math.max(tl.maxX, bl.maxX);
  let textY = Math.max(tl.maxY, tr.maxY);
  let textW = Math.min(tr.minX, br.minX) - textX;
  let textH = Math.min(br.minY, bl.minY) - textY;

  if (textW <= 0 || textH <= 0) {
    const xs = corners.map(d => d.x);
    const ys = corners.map(d => d.y);
    const cMinX = Math.min(...xs), cMaxX = Math.max(...xs);
    const cMinY = Math.min(...ys), cMaxY = Math.max(...ys);
    const fpad = 2;
    textX = Math.max(0, cMinX - fpad);
    textY = Math.max(0, cMinY - fpad);
    textW = Math.min(sw - textX, cMaxX - cMinX + fpad * 2);
    textH = Math.min(sh - textY, cMaxY - cMinY + fpad * 2);
  }

  textCanvas.width = textW;
  textCanvas.height = textH;
  const textCtx = textCanvas.getContext("2d");
  textCtx.fillStyle = "#FFFFFF";
  textCtx.fillRect(0, 0, textW, textH);
  textCtx.drawImage(qrCanvas, textX, textY, textW, textH, 0, 0, textW, textH);
  textSignal.classList.add("hide");

  debugCtx.strokeStyle = "#000000";
  debugCtx.lineWidth = 1;
  debugCtx.setLineDash([3, 3]);
  debugCtx.strokeRect(textX, textY, textW, textH);
  debugCtx.setLineDash([]);

  // 4. 進行 OCR 辨識 (加鎖防止即時影像太卡)
  if (ocrProcessing) return;
  ocrProcessing = true;
  setStatus("PROCESSING OCR ENGINE...");

  textCanvas.toBlob(async blob => {
    downloadQr.disabled = false;
    downloadText.disabled = false;

    try {
      const { data: { words } } = await Tesseract.recognize(blob, "eng", {
        tessedit_ocr_engine_mode: "1",
        tessedit_pageseg_mode: "7",
        preserve_interword_spaces: "1"
      });

      const CONFIDENCE_THRESHOLD = 30;
      const highConfWords = words.filter(w => w.confidence >= CONFIDENCE_THRESHOLD);
      let resultText = highConfWords.map(w => w.text).join(" ").trim();
      resultText = resultText.replace(/\s+/g, '');

      if (resultText) {
        ocrResult.textContent = resultText;
        ocrResult.classList.remove("empty");
        setStatus("MATRIX PROCESS COMPLETED");
      } else {
        ocrResult.textContent = "WARN: LOW CONFIDENCE SCAN...";
        ocrResult.classList.add("empty");
        setStatus("SCANNING...");
      }
    } catch (e) {
      console.error(e);
    } finally {
      ocrProcessing = false; // 解鎖，準備下一次辨識
    }
  });
}

function findRedDots(ctx, w, h) {
  const imageData = ctx.getImageData(0, 0, w, h);
  const data = imageData.data;
  const labels = new Int32Array(w * h).fill(-1);
  const blobs = [];

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const idx = (y * w + x);
      const pi = idx * 4;
      const r = data[pi], g = data[pi + 1], b = data[pi + 2];
      const isRed = (r > 160 && g < 110 && b < 110 && (r - g) > 50 && (r - b) > 50); // 稍微放寬即時影像的濾鏡標準
      if (!isRed || labels[idx] !== -1) continue;

      const stack = [{x, y}];
      const label = blobs.length;
      labels[idx] = label;

      let sx = 0, sy = 0, count = 0;
      let bminX = x, bmaxX = x, bminY = y, bmaxY = y;

      while (stack.length > 0) {
        const {x: cx, y: cy} = stack.pop();
        sx += cx; sy += cy; count++;
        if (cx < bminX) bminX = cx;
        if (cx > bmaxX) bmaxX = cx;
        if (cy < bminY) bminY = cy;
        if (cy > bmaxY) bmaxY = cy;
        for (const [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
          const nx = cx + dx, ny = cy + dy;
          if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
          const nidx = ny * w + nx;
          if (binaryCheck(data, nidx) && labels[nidx] === -1) {
            labels[nidx] = label;
            stack.push({x: nx, y: ny});
          }
        }
      }

      if (count > 0) {
        blobs.push({
          x: sx / count, y: sy / count, count,
          minX: bminX, maxX: bmaxX, minY: bminY, maxY: bmaxY
        });
      }
    }
  }

  const minArea = Math.max(4, w * h * 0.0001);
  const maxArea = Math.max(100, w * h * 0.08);
  let valid = blobs.filter(b => b.count >= minArea && b.count <= maxArea);
  valid.sort((a, b) => b.count - a.count);
  return valid.slice(0, 8);
}

function binaryCheck(data, idx) {
  const pi = idx * 4;
  return data[pi] > 160 && data[pi + 1] < 110 && data[pi + 2] < 110
      && (data[pi] - data[pi + 1]) > 50 && (data[pi] - data[pi + 2]) > 50;
}

function pick4Corners(dots) {
  const cx = dots.reduce((s, d) => s + d.x, 0) / dots.length;
  const cy = dots.reduce((s, d) => s + d.y, 0) / dots.length;

  const scored = dots.map(d => ({
    ...d,
    dist: Math.sqrt((d.x - cx) ** 2 + (d.y - cy) ** 2),
    angle: Math.atan2(d.y - cy, d.x - cx)
  }));
  scored.sort((a, b) => b.dist - a.dist);

  const top4 = scored.slice(0, 4);
  const quad = { tl: null, tr: null, br: null, bl: null };
  top4.forEach(d => {
    if (d.x < cx && d.y < cy) quad.tl = d;
    else if (d.x >= cx && d.y < cy) quad.tr = d;
    else if (d.x >= cx && d.y >= cy) quad.br = d;
    else quad.bl = d;
  });

  const result = [quad.tl, quad.tr, quad.br, quad.bl].filter(Boolean);
  if (result.length >= 4) return result;
  return top4.slice(0, 4);
}

downloadQr.onclick = () => {
  const link = document.createElement("a");
  link.download = "qr-matrix_crop.png";
  link.href = qrCanvas.toDataURL("image/png");
  link.click();
};

downloadText.onclick = () => {
  const link = document.createElement("a");
  link.download = "text-roi_crop.png";
  link.href = textCanvas.toDataURL("image/png");
  link.click();
};

function updateClock() {
  const now = new Date();
  statusTime.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
}
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
