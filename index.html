<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DeviceOrientation 範例</title>
<style>
body {
  font-family: Arial;
  text-align: center;
}

.box {
  font-size: 24px;
  margin: 20px;
}
</style>
</head>

<body>

<h1>手機方向感測</h1>

<div class="box">
Alpha: <span id="alpha">0</span>°
</div>

<div class="box">
Beta: <span id="beta">0</span>°
</div>

<div class="box">
Gamma: <span id="gamma">0</span>°
</div>


<script>

function startOrientation(){

  window.addEventListener(
    "deviceorientation",
    function(event){

      let alpha = event.alpha;
      let beta  = event.beta;
      let gamma = event.gamma;


      document.getElementById("alpha").innerHTML =
        alpha ? alpha.toFixed(1) : 0;

      document.getElementById("beta").innerHTML =
        beta ? beta.toFixed(1) : 0;

      document.getElementById("gamma").innerHTML =
        gamma ? gamma.toFixed(1) : 0;

    }
  );

}


// iOS 需要權限
if(
 typeof DeviceOrientationEvent !== "undefined" &&
 typeof DeviceOrientationEvent.requestPermission === "function"
){

 document.body.innerHTML +=
 '<button id="btn">啟動感測器</button>';

 document.getElementById("btn").onclick = async ()=>{

   let permission =
     await DeviceOrientationEvent.requestPermission();

   if(permission === "granted"){
      startOrientation();
   }

 };

}else{

 startOrientation();

}

</script>

</body>
</html>
