<!DOCTYPE html>
<html lang="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NES-8-BIT-CAMERA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #f8f8f8;
      font-family: 'Courier New', Courier, monospace;
    }

    /* 核心修改：讓容器在保持 4:3 的情況下，拉到視窗的最大極限 */
    .screen-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: calc(100vh * 4 / 3); /* 當視窗太寬時，寬度限制在 4:3 */
      max-height: calc(100vw * 3 / 4); /* 當視窗太高時，高度限制在 4:3 */
      aspect-ratio: 4 / 3;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 50px rgba(0,0,0,1);
    }

    canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      object-fit: contain;
    }

    /* CRT 螢幕掃描線效果（自動適應縮放） */
    .screen-container::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 6px, 6px 100%; /* 微調掃描線密度以配合大螢幕 */
      pointer-events: none;
      z-index: 2;
    }

    video { display: none; }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 8px 12px;
      border: 2px solid #f8f8f8;
      font-size: 14px;
      text-transform: uppercase;
      z-index: 10;
      box-shadow: 3px 3px 0px #e45c10;
    }
  </style>
</head>
<body>

  <div id="ui">PAUSE<br>1P READY<br>NES_FULLSCREEN</div>
  
  <video id="rawVideo" autoplay playsinline></video>
  
  <div class="screen-container">
    <canvas id="nesCanvas"></canvas>
  </div>

  <script>
    const video = document.getElementById('rawVideo');
    const canvas = document.getElementById('nesCanvas');
    const ctx = canvas.getContext('2d');

    // NES 標準寬度 256
    const NES_WIDTH = 256; 

    // NES 經典 16 色調色盤
    const NES_PALETTE = [
      [116, 116, 116], [0, 0, 252],     [0, 0, 188],     [104, 4, 148],
      [216, 40, 0],    [188, 148, 16],  [0, 112, 0],     [0, 132, 0],
      [252, 252, 252], [60, 188, 252],  [148, 88, 252],  [248, 120, 248],
      [252, 116, 96],  [252, 216, 84],  [168, 204, 0],   [0, 0, 0]
    ];

    navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'environment', width: 640, height: 480 } 
    })
    .then(stream => { 
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        // 設定 Canvas 內部的真實 8-bit 解析度
        canvas.width = NES_WIDTH;
        canvas.height = Math.floor(NES_WIDTH * (3 / 4)); // 4:3 比例 (192)
        
        ctx.imageSmoothingEnabled = false;
        
        // 啟動更順暢的 requestAnimationFrame 渲染循環
        requestAnimationFrame(loop);
      };
    })
    .catch(err => { console.error(err); });

    function loop() {
      drawNESFrame();
      requestAnimationFrame(loop); // 自動同步螢幕刷新率
    }

    function drawNESFrame() {
      if (video.paused || video.ended) return;

      // 1. 將視訊格縮小繪製到畫布
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;

      // 2. 8-Bit 色彩對應運算
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];

        let closestColor = NES_PALETTE[0];
        let minDistance = Infinity;

        for (let j = 0; j < NES_PALETTE.length; j++) {
          const pr = NES_PALETTE[j][0];
          const pg = NES_PALETTE[j][1];
          const pb = NES_PALETTE[j][2];

          const distance = Math.pow(r - pr, 2) + Math.pow(g - pg, 2) + Math.pow(b - pb, 2);
          if (distance < minDistance) {
            minDistance = distance;
            closestColor = NES_PALETTE[j];
          }
        }

        data[i]     = closestColor[0];
        data[i + 1] = closestColor[1];
        data[i + 2] = closestColor[2];
      }

      // 3. 放回像素資料（CSS 會負責將其等比例放大到視窗最大）
      ctx.putImageData(imgData, 0, 0);
    }
  </script>
</body>
</html>
